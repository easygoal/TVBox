name: Build apk

on:
#  push:
#    branches:
#      - main
#  pull_request:
  workflow_dispatch:
    inputs:
      abi:
        description: 'CPU 架构 (ABI)'
        required: true
        default: 'all'
        type: choice
        options: [ 'armeabi', 'arm64', 'all' ]
      brand:
        description: '品牌版本'
        required: true
        default: 'generic'
        type: choice
        options: [ 'generic', 'hisense', 'all' ]
      mode:
        description: '运行模式'
        required: true
        default: 'all'
        type: choice
        options: [ 'normal', 'python', 'all' ]
      release_tag:
        description: 'Release 版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: create local.properties
        run: |
          echo "sdk.dir=\$ANDROID_HOME" > local.properties
      - name: Build With Gradle
        run: chmod +x gradlew

      - name: Compile APK
        run: |
          # 遍历选择的架构
          abis="${{ github.event.inputs.abi }}"
          [ "$abis" = "all" ] && abis="armeabi arm64"

          # 遍历选择的品牌
          brands="${{ github.event.inputs.brand }}"
          [ "$brands" = "all" ] && brands="generic hisense"

          # 遍历选择的模式
          modes="${{ github.event.inputs.mode }}"
          [ "$modes" = "all" ] && modes="normal python"

          # 自动生成所有组合的编译命令
          for abi in $abis; do
            for brand in $brands; do
              for mode in $modes; do
                ./gradlew assemble${abi^}${brand^}${mode^}Debug
              done
            done
          done

      - name: Prepare App
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          for file in `find ~ -name "*.apk" -print`; do
            mv "$file" ${{ github.workspace }}/apk/
          done
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-${{ github.event.inputs.abi }}-${{ github.event.inputs.brand }}-${{ github.event.inputs.mode }}
          path: ${{ github.workspace }}/apk/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Release ${{ github.event.inputs.release_tag }}
          body: |
            自动编译发布
            支持架构：${{ github.event.inputs.abi }}
            支持版本：${{ github.event.inputs.brand }}
            运行模式：${{ github.event.inputs.mode }}
          files: ${{ github.workspace }}/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
